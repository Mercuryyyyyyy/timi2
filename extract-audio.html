<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提取音频 - 合成大timi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fce4ec; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #e91e63; text-align: center; margin: 20px 0; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .drop-zone {
      border: 2px dashed #e91e63; border-radius: 12px; padding: 40px 20px;
      text-align: center; color: #999; transition: all 0.3s; cursor: pointer;
    }
    .drop-zone.drag-over { background: #fce4ec; border-color: #c2185b; }
    .drop-zone input { display: none; }
    .file-list { margin-top: 16px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: #f5f5f5; border-radius: 8px; margin-bottom: 8px;
    }
    .file-item .name { font-size: 13px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .status { font-size: 12px; margin-left: 12px; white-space: nowrap; }
    .done { color: #4caf50; } .error { color: #f44336; } .processing { color: #ff9800; }
    .info { font-size: 12px; color: #999; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 视频提取音频</h1>
    <div class="card">
      <h3 style="margin-bottom:12px;color:#333">使用说明</h3>
      <p style="font-size:13px;color:#666;line-height:1.6">
        1. 把视频文件（MP4/MOV/WebM等）拖到下方<br>
        2. 自动提取音频并下载为 <b>WAV</b> 文件<br>
        3. 把下载的 WAV 放到对应 <code>public/audio/英雄名/</code> 目录<br>
        4. 运行 <code>npm run download-audio</code> 更新清单
      </p>
    </div>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <p style="font-size:16px;margin-bottom:8px">📁 点击或拖拽视频到这里</p>
        <p style="font-size:12px;color:#ccc">支持 MP4, WebM, MOV, AVI 等</p>
        <input type="file" id="fileInput" accept="video/*" multiple>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('video/') && !file.name.match(/\.(mp4|webm|mov|avi|mkv|flv|wmv)$/i)) continue;
        const item = addFileItem(file);
        try {
          updateStatus(item, 'processing', '解码中...');
          const wav = await extractAudioWav(file);
          updateStatus(item, 'processing', '下载中...');
          downloadWav(wav, file.name);
          updateStatus(item, 'done', '✅ 完成');
        } catch (e) {
          updateStatus(item, 'error', '❌ ' + e.message);
        }
      }
    }

    function addFileItem(file) {
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `<span class="name">${file.name}</span><span class="status processing">处理中...</span>`;
      fileList.prepend(div);
      return div;
    }

    function updateStatus(item, cls, text) {
      item.querySelector('.status').className = 'status ' + cls;
      item.querySelector('.status').textContent = text;
    }

    async function extractAudioWav(file) {
      const arrayBuffer = await file.arrayBuffer();
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // decodeAudioData can extract audio from video containers in modern browsers
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
      audioCtx.close();
      return audioBufferToWav(audioBuffer);
    }

    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const bitsPerSample = 16;
      const data = buffer.getChannelData(0);
      const dataLength = data.length * (bitsPerSample / 8);
      const headerLength = 44;
      const totalLength = headerLength + dataLength;

      const wav = new ArrayBuffer(totalLength);
      const view = new DataView(wav);

      function w(str, off) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
      w('RIFF', 0); view.setUint32(4, totalLength - 8, true); w('WAVE', 8);
      w('fmt ', 12); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * numChannels * (bitsPerSample / 8), true);
      view.setUint16(32, numChannels * (bitsPerSample / 8), true); view.setUint16(34, bitsPerSample, true);
      w('data', 36); view.setUint32(40, dataLength, true);

      let off = 44;
      for (let i = 0; i < data.length; i++) {
        const s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        off += 2;
      }
      return wav;
    }

    function downloadWav(wav, originalName) {
      const blob = new Blob([wav], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = originalName.replace(/\.[^.]+$/, '') + '.wav';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
